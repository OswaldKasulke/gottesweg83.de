name: Deploy to FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: w019d9c9.kasserver.com
          username: w019d9c9
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /gottesweg83.de/
